<!DOCTYPE html>
<html>
<head>
    <title>User Detail</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family:Arial;
            background:#f5f6fa;
            padding:20px;
        }

        .card{
            background:white;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#2c3e50;
            color:white;
        }

        a{
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<h2>👤 {{ username }} - Full Analysis</h2>

<a href="/admin">⬅ Back to Admin</a>

<!-- GRAPH -->
<div class="card">
    <canvas id="chart"></canvas>
</div>

<!-- TABLE -->
<div class="card">
    <h3>Driving History</h3>

    <table>
        <tr>
            <th>Deviation</th>
            <th>Stops</th>
            <th>Confusion</th>
            <th>Score</th>
            <th>Type</th>
            <th>Time</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

<script>
let scores = {{ data | map(attribute=3) | list | tojson }};
let labels = {{ data | map(attribute=5) | list | tojson }};

new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Score',
            data: scores,
            tension:0.3
        }]
    }
});
</script>

</body>
</html>
