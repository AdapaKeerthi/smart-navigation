<!DOCTYPE html>
<html lang="en">
<head>
  <title>DriveIQ – Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050810;
      --surface: #0f1629;
      --accent: #10b981;
      --accent2: #06b6d4;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .bg-glow { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.12;
      animation: float 8s ease-in-out infinite;
    }
    .g1 { width: 400px; height: 400px; background: var(--accent); top: -100px; right: -100px; }
    .g2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; left: -80px; animation-delay: 3s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 380px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      animation: slideUp 0.5s ease both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .tagline { font-size: 13px; color: var(--muted); margin-bottom: 36px; }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 8px;
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus { border-color: var(--accent); background: rgba(16,185,129,0.08); }
    input::placeholder { color: var(--muted); }

    .hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      margin-top: 28px;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 14px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .footer-link { text-align: center; margin-top: 24px; font-size: 14px; color: var(--muted); }
    .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="bg-glow">
  <div class="glow-circle g1"></div>
  <div class="glow-circle g2"></div>
</div>

<div class="card">
  <div class="logo">⚡ DriveIQ</div>
  <div class="tagline">Create your account</div>

  <form method="POST">
    <label>Username</label>
    <input type="text" name="username" placeholder="Choose a username" required autofocus minlength="3">
    <div class="hint">Minimum 3 characters</div>

    <label>Password</label>
    <input type="password" name="password" placeholder="Create a password" required minlength="6">
    <div class="hint">Minimum 6 characters</div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <button class="btn" type="submit">Create Account →</button>
  </form>

  <div class="footer-link">
    Already have an account? <a href="/login">Login here</a>
  </div>
</div>

</body>
</html>
