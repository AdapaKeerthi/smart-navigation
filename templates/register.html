<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#43e97b,#38f9d7);
        }

        .card{
            background:white;
            padding:30px;
            border-radius:15px;
            width:300px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid #ccc;
            outline:none;
        }

        input:focus{
            border-color:#43e97b;
        }

        button{
            width:100%;
            padding:12px;
            background:#43e97b;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#2ecc71;
        }

        a{
            display:block;
            margin-top:15px;
            text-decoration:none;
            color:#2ecc71;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>📝 Register</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <a href="/login">Already have an account? Login</a>
</div>

</body>
</html>
