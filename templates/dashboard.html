<!DOCTYPE html>
<html>
<head>
    <title>Driver Dashboard</title>
    <style>
        body { font-family: Arial; background:#f5f5f5; padding:20px; }
        .card {
            background:white;
            padding:15px;
            margin:10px 0;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </style>
</head>
<body>

<h2>🚗 Driver Behavior Dashboard</h2>

{% for d in data %}
<div class="card">
    <h3>Score: {{ d.score }}</h3>
    <p>Type: {{ d.driver_type }}</p>
</div>
{% endfor %}

</body>
</html>
