<!DOCTYPE html>
<html>
<head>
    <title>Driver Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body{
            font-family: Arial;
            background:#f5f6fa;
            margin:0;
            padding:20px;
        }

        h2{
            text-align:center;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th, td{
            padding:10px;
            border-bottom:1px solid #ddd;
            text-align:center;
        }

        th{
            background:#2d3436;
            color:white;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        }

        a{
            text-decoration:none;
            color:#0984e3;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="top">
    <h2>📊 Driver Dashboard</h2>
    <a href="/">⬅ Back</a>
</div>

<!-- ================= GRAPH ================= -->
<div class="card">
    <canvas id="chart"></canvas>
</div>

<!-- ================= TABLE ================= -->
<div class="card">
    <h3>📋 Driving History</h3>

    <table>
        <tr>
            <th>Deviation</th>
            <th>Stops</th>
            <th>Confusion</th>
            <th>Score</th>
            <th>Type</th>
            <th>Time</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
            <td>{{ row[6] }}</td>
            <td>{{ row[7] }}</td>
        </tr>
        {% endfor %}

    </table>
</div>

<!-- ================= SCRIPT ================= -->
<script>
    // FIXED: using |tojson (important)

    let scores = {{ data | map(attribute=5) | list | tojson }};
    let labels = {{ data | map(attribute=7) | list | tojson }};

    new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Score",
                data: scores,
                fill: false,
                tension: 0.3
            }]
        }
    });
</script>
<canvas id="chart"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
let scores = {{ data|map(attribute=3)|list|safe }};

new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
        labels: scores.map((_,i)=>i+1),
        datasets: [{
            label: "Driving Score",
            data: scores
        }]
    }
});
</script>

</body>
</html>
