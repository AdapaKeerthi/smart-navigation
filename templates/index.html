<!DOCTYPE html>
<html>
<head>
    <title>Smart Navigation</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body{margin:0;font-family: Arial;}
        #map{height:100vh;width:100%;}

        .search-box{
            position:absolute;top:20px;left:50%;
            transform:translateX(-50%);
            background:white;padding:15px;border-radius:12px;
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            width:300px;z-index:1000;
        }

        .search-box input,.search-box select{
            width:100%;padding:10px;margin:6px 0;
            border-radius:8px;border:1px solid #ccc;
        }

        .search-box button{
            width:100%;padding:12px;margin-top:8px;
            background:#1a73e8;color:white;border:none;
            border-radius:8px;font-weight:bold;cursor:pointer;
        }

        .floating{
            position:absolute;bottom:20px;right:20px;
            display:flex;flex-direction:column;gap:10px;
            z-index:1000;
        }

        .floating button{
            width:55px;height:55px;border-radius:50%;
            border:none;background:#1a73e8;color:white;
        }

        .top-menu{
            position:absolute;top:20px;right:20px;z-index:1000;
        }

        .top-menu a{
            margin-left:10px;background:white;padding:8px;
            border-radius:8px;text-decoration:none;color:black;
        }

        .info-box{
            position:absolute;bottom:20px;left:20px;
            background:white;padding:12px;border-radius:10px;
        }
    </style>
</head>

<body>

<div id="map"></div>

<div class="search-box">
    <input id="start" placeholder="Start location">
    <input id="end" placeholder="Destination">
    <button onclick="startNav()">🚀 Start</button>

    <select id="lang">
        <option>English</option>
        <option>Hindi</option>
        <option>Telugu</option>
    </select>
</div>

<div class="top-menu">
    <a href="/dashboard">📊 Dashboard</a>
    <a href="/logout">🚪 Logout</a>
</div>

<div class="floating">
    <button onclick="findPlace('fuel')">⛽</button>
    <button onclick="findPlace('hotel')">🏨</button>
    <button onclick="findPlace('atm')">🏧</button>
</div>

<div class="info-box" id="stats">
    Distance: -- <br> Time: --
</div>

<script>
const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImUyNjVjNzM5YjIyYjQyN2RhMjY2OGQ5NmNhNzQ1ODBiIiwiaCI6Im11cm11cjY0In0="; // 🔥 ADD YOUR KEY HERE

let map = L.map('map').setView([17.3850,78.4867], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker, routeLine;
let routeCoords = [];
let navigationActive = false;
let rerouting = false;

/* GPS TRACK */
navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if(!userMarker){
        userMarker = L.marker([lat,lon]).addTo(map);
    }else{
        userMarker.setLatLng([lat,lon]);
    }

    map.setView([lat,lon],13);

    if(navigationActive){
        checkDeviation([lat,lon]);
    }

},{enableHighAccuracy:true});

/* START NAVIGATION */
async function startNav(){

    let res = await fetch('/get_route_type');
    let routeType = (await res.json()).type;

    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    let geoStart = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(start)}`);
    let geoEnd = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(end)}`);

    let sdata = await geoStart.json();
    let edata = await geoEnd.json();

    let sCoord = sdata.features[0].geometry.coordinates;
    let eCoord = edata.features[0].geometry.coordinates;

    let routeRes = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
        method:"POST",
        headers:{
            "Authorization":API_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify({coordinates:[sCoord,eCoord]})
    });

    let routeData = await routeRes.json();

    if(routeLine) map.removeLayer(routeLine);

    let color = routeType==="safe"?"green":routeType==="normal"?"blue":"red";

    routeLine = L.geoJSON(routeData,{style:{color:color,weight:6}}).addTo(map);
    map.fitBounds(routeLine.getBounds());

    routeCoords = routeData.features[0].geometry.coordinates;
    navigationActive = true;

    let summary = routeData.features[0].properties.summary;
    let distance = (summary.distance/1000).toFixed(2);
    let time = (summary.duration/3600).toFixed(2);

    document.getElementById("stats").innerHTML =
        "Distance: "+distance+" KM <br> Time: "+time+" hr";

    speak("Navigation started");
    saveBehavior();
}

/* OFF ROUTE DETECTION */
function checkDeviation(userPos){

    let minDist = Infinity;

    routeCoords.forEach(coord=>{
        let p = [coord[1], coord[0]];
        let d = map.distance(userPos, p);
        if(d < minDist) minDist = d;
    });

    if(minDist > 100 && !rerouting){
        rerouting = true;

        speak("Warning! You are off route");
        alert("⚠️ You are off route! Rerouting...");

        reroute(userPos);
    }
}

/* REROUTE */
async function reroute(userPos){

    let end = document.getElementById("end").value;

    let geoEnd = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(end)}`);
    let edata = await geoEnd.json();

    let endCoord = edata.features[0].geometry.coordinates;

    let routeRes = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
        method:"POST",
        headers:{
            "Authorization":API_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            coordinates: [[userPos[1],userPos[0]], endCoord]
        })
    });

    let routeData = await routeRes.json();

    routeCoords = routeData.features[0].geometry.coordinates;

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON(routeData,{style:{color:"red",weight:6}}).addTo(map);

    map.fitBounds(routeLine.getBounds());

    let summary = routeData.features[0].properties.summary;

    document.getElementById("stats").innerHTML =
        "Distance: "+(summary.distance/1000).toFixed(2)+" KM <br> Time: "+
        (summary.duration/3600).toFixed(2)+" hr";

    speak("New route calculated");

    rerouting = false;
}

/* SPEECH */
function speak(text){
    let lang = document.getElementById("lang").value;
    let msg = new SpeechSynthesisUtterance(text);

    if(lang=="Hindi") msg.lang="hi-IN";
    else if(lang=="Telugu") msg.lang="te-IN";
    else msg.lang="en-US";

    speechSynthesis.speak(msg);
}

/* EXTRA */
function findPlace(type){
    alert("Showing nearby "+type);
}

function saveBehavior(){
    navigator.geolocation.getCurrentPosition(pos=>{
        fetch('/save_behavior',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                deviations:1,stops:1,
                lat:pos.coords.latitude,
                lon:pos.coords.longitude
            })
        });
    });
}
</script>

</body>
</html>
