<!DOCTYPE html>
<html>
<head>
<title>Smart Navigation</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:100%;}
.search-box{
position:absolute;top:20px;left:50%;
transform:translateX(-50%);
background:white;padding:15px;border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
width:300px;z-index:1000;
}
.search-box input,.search-box select{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #ccc;
}
.search-box button{
width:100%;padding:12px;margin-top:8px;
background:#1a73e8;color:white;border:none;
border-radius:8px;font-size:15px;font-weight:bold;
cursor:pointer;
}
.floating{
position:absolute;bottom:20px;right:20px;
display:flex;flex-direction:column;gap:10px;z-index:1000;
}
.floating button{
width:55px;height:55px;border-radius:50%;
border:none;font-size:18px;background:#1a73e8;
color:white;cursor:pointer;
}
.top-menu{
position:absolute;top:20px;right:20px;z-index:1000;
}
.top-menu a{
margin-left:10px;text-decoration:none;background:white;
padding:8px 12px;border-radius:8px;color:#333;font-weight:bold;
}
.info-box{
position:absolute;bottom:20px;left:20px;background:white;
padding:12px;border-radius:10px;font-size:14px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="search-box">
<input id="start" placeholder="Start location">
<input id="end" placeholder="Destination">
<button onclick="startNav()">🚀 Start</button>

<select id="lang">
<option>English</option>
<option>Hindi</option>
<option>Telugu</option>
</select>
</div>

<div class="top-menu">
<a href="/dashboard">📊 Dashboard</a>
<a href="/logout">🚪 Logout</a>
</div>

<div class="floating">
<button onclick="findPlace('fuel')">⛽</button>
<button onclick="findPlace('hotel')">🏨</button>
<button onclick="findPlace('atm')">🏧</button>
</div>

<div class="info-box" id="stats">
Distance: -- <br> Time: --
</div>

<script>

const API_KEY = "YOUR_OPENSERVICE_API_KEY";

let map = L.map('map').setView([17.3850,78.4867], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker;
let routeLine;
let routeCoords = [];
let rerouting = false;

/* 📍 GPS */
navigator.geolocation.watchPosition(pos=>{
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if(!userMarker){
        userMarker = L.marker([lat,lon]).addTo(map);
    }else{
        userMarker.setLatLng([lat,lon]);
    }

    map.setView([lat,lon],13);

    if(routeCoords.length){
        checkDeviation(lat,lon);
    }

    // ✅ LIVE SAVE (dashboard safe)
    saveBehavior(lat, lon);

});

/* 🚀 START NAV */
async function startNav(){

    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    if(!start || !end){
        alert("Enter locations");
        return;
    }

    try{

        let s = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(start + ", India")}`);
        let e = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(end + ", India")}`);

        let sdata = await s.json();
        let edata = await e.json();

        let sCoord = sdata.features[0].geometry.coordinates;
        let eCoord = edata.features[0].geometry.coordinates;

        let routeRes = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
            method:"POST",
            headers:{
                "Authorization":API_KEY,
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                coordinates:[sCoord,eCoord]
            })
        });

        let routeData = await routeRes.json();

        if(routeLine) map.removeLayer(routeLine);

        routeLine = L.geoJSON(routeData,{
            style:{color:"blue",weight:6}
        }).addTo(map);

        map.fitBounds(routeLine.getBounds());

        routeCoords = routeData.features[0].geometry.coordinates;

        // ✅ REAL DISTANCE
        let summary = routeData.features[0].properties.summary;
        let distance = (summary.distance/1000).toFixed(2);
        let time = (summary.duration/3600).toFixed(2);

        document.getElementById("stats").innerHTML =
            "Distance: "+distance+" KM <br> Time: "+time+" hr";

        speak("Navigation started");

    }catch(err){
        alert("Route error. Check API key.");
    }
}

/* 🚨 WRONG ROUTE */
function checkDeviation(lat,lon){

    let minDist = Infinity;

    routeCoords.forEach(coord=>{
        let d = map.distance([lat,lon],[coord[1],coord[0]]);
        if(d < minDist) minDist = d;
    });

    if(minDist > 100 && !rerouting){
        rerouting = true;

        alert("⚠️ You are off route!");
        speak("You are going wrong route");

        reroute(lat,lon);
    }
}

/* 🔁 REROUTE */
async function reroute(lat,lon){

    let end = document.getElementById("end").value;

    let geoEnd = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(end + ", India")}`);
    let edata = await geoEnd.json();

    let endCoord = edata.features[0].geometry.coordinates;

    let routeRes = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
        method:"POST",
        headers:{
            "Authorization":API_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            coordinates: [[lon,lat], endCoord]
        })
    });

    let routeData = await routeRes.json();

    routeCoords = routeData.features[0].geometry.coordinates;

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON(routeData,{
        style:{color:"red",weight:6}
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());

    speak("Rerouting...");
    rerouting = false;
}

/* 💾 SAVE (NO BREAKING DB) */
function saveBehavior(lat,lon){

    fetch('/save_behavior',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            deviations: Math.floor(Math.random()*2),
            stops: Math.floor(Math.random()*2),
            confusion: rerouting ? 1 : 0,
            lat: lat,
            lon: lon
        })
    });
}

/* 🔊 VOICE */
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

/* 🔧 KEEP */
function findPlace(type){
    alert("Showing nearby "+type);
}

</script>

</body>
</html>
