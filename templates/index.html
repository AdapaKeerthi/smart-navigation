<!DOCTYPE html>
<html>
<head>
<title>Smart Navigation</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial;}
#map{height:100vh;width:100%;}
.search-box{
position:absolute;top:20px;left:50%;
transform:translateX(-50%);
background:white;padding:15px;border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
width:300px;z-index:1000;
}
.search-box input,.search-box select{
width:100%;padding:10px;margin:6px 0;
border-radius:8px;border:1px solid #ccc;
}
.search-box button{
width:100%;padding:12px;margin-top:8px;
background:#1a73e8;color:white;border:none;
border-radius:8px;font-size:15px;font-weight:bold;
cursor:pointer;
}
.floating{
position:absolute;bottom:20px;right:20px;
display:flex;flex-direction:column;gap:10px;z-index:1000;
}
.floating button{
width:55px;height:55px;border-radius:50%;
border:none;font-size:18px;background:#1a73e8;
color:white;cursor:pointer;
}
.top-menu{
position:absolute;top:20px;right:20px;z-index:1000;
}
.top-menu a{
margin-left:10px;text-decoration:none;background:white;
padding:8px 12px;border-radius:8px;color:#333;font-weight:bold;
}
.info-box{
position:absolute;bottom:20px;left:20px;background:white;
padding:12px;border-radius:10px;font-size:14px;
}
</style>
</head>

<body>


<div id="map"></div>
<div class="search-box">
<input id="start" placeholder="Start location">
<input id="end" placeholder="Destination">
<button onclick="startNav()">🚀 Start</button>

<select id="lang">
<option>English</option>
<option>Hindi</option>
<option>Telugu</option>
</select>
</div>

<div class="top-menu">
<a href="/dashboard">📊 Dashboard</a>
<a href="/logout">🚪 Logout</a>
</div>

<div class="floating">
<button onclick="findPlace('fuel')">⛽</button>
<button onclick="findPlace('hotel')">🏨</button>
<button onclick="findPlace('atm')">🏧</button>
</div>

<div class="info-box" id="stats">
Distance: -- <br> Time: --
</div>

<script>

const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImUyNjVjNzM5YjIyYjQyN2RhMjY2OGQ5NmNhNzQ1ODBiIiwiaCI6Im11cm11cjY0In0=";

let map = L.map('map').setView([17.3850,78.4867], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let userMarker = null;
let routeLine;
let routeCoords = [];
let rerouting = false;
let started = false;
let lastLat = null;
let lastLon = null;
let warningGiven = false;
let lastUpdate = 0;
let navigationStarted = false;


function getDistance(lat1, lon1, lat2, lon2) {
    let R = 6371;
    let dLat = (lat2 - lat1) * Math.PI / 180;
    let dLon = (lon2 - lon1) * Math.PI / 180;

    let a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);

    let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

/* 📍 GPS */
navigator.geolocation.watchPosition(
function(position) {

    const lat = position.coords.latitude;
    const lon = position.coords.longitude;

    // ✅ Marker
    if (userMarker) {
        userMarker.setLatLng([lat, lon]);
    } else {
        userMarker = L.marker([lat, lon], {
            icon: L.icon({
                iconUrl: "https://cdn-icons-png.flaticon.com/512/684/684908.png",
                iconSize: [30, 30]
            })
        }).addTo(map).bindPopup("You are here").openPopup();
    }

    if (!navigationStarted) {
    map.setView([lat, lon], 15);
}

    // ✅ FIRST TIME SKIP
    if (lastLat === null) {
        lastLat = lat;
        lastLon = lon;
        return;
    }

    let distanceMoved = getDistance(lat, lon, lastLat, lastLon);

    if (!started && distanceMoved > 0.02) {
        started = true;
        speak("Navigation started");
    }

    if (!started) return;

    checkRoute(lat, lon);

    lastLat = lat;
    lastLon = lon;

},
function(error) {

    console.log("GPS Error:", error);

    if (error.code === 1) {
        alert("Please allow location access!");
    } else if (error.code === 2) {
        alert("Location unavailable!");
    } 

},
{
    enableHighAccuracy: true,
    maximumAge: 10000,
    timeout: 20000
});

/* 🚀 START NAV */
async function startNav(){

    let start = document.getElementById("start").value;
    let end = document.getElementById("end").value;

    if(!start || !end){
        alert("Enter locations");
        return;
    }

    try{

        // 🔍 GEOCODE
         let s = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(start)}&boundary.country=IN&size=1`);
        let e = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(end)}&boundary.country=IN&size=1`);

        let sdata = await s.json();
        let edata = await e.json();

        if (!sdata.features.length || !edata.features.length){
            alert("Location not found");
            return;
        }

        let sCoord = sdata.features[0].geometry.coordinates;
        let eCoord = edata.features[0].geometry.coordinates;

        // 🚗 ROUTE API
        let routeRes = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
            method:"POST",
            headers:{
                "Authorization":API_KEY,
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                coordinates:[sCoord,eCoord]
            })
        });

        let routeData = await routeRes.json();

        // ❌ ERROR CHECK
        if (!routeData.features){
            console.log(routeData);
            alert("Route error. Check API key.");
            return;
        }

        // 🗺️ REMOVE OLD ROUTE
        if (routeLine) {
            map.removeLayer(routeLine);
        }

        // 🟦 DRAW ROUTE
        routeLine = L.geoJSON(routeData,{
            style:{color:"blue",weight:6}
        }).addTo(map);

        map.fitBounds(routeLine.getBounds());
        navigationStarted = true;
        routeCoords = routeData.features[0].geometry.coordinates;

        // 📍 MARKERS
        if (window.startMarker) map.removeLayer(window.startMarker);
        if (window.endMarker) map.removeLayer(window.endMarker);

        window.startMarker = L.marker([sCoord[1], sCoord[0]])
            .addTo(map)
            .bindPopup("Start")
            .openPopup();

        window.endMarker = L.marker([eCoord[1], eCoord[0]])
            .addTo(map)
            .bindPopup("Destination");

        // 📏 DISTANCE + TIME
      let feature = routeData.features[0];

let distance = 0;
let time = 0;

// ✅ Try summary first
if (feature.properties.summary) {
    distance = feature.properties.summary.distance;
    time = feature.properties.summary.duration;
}
// ✅ Fallback to segments (IMPORTANT FIX)
else if (feature.properties.segments && feature.properties.segments.length > 0) {
    distance = feature.properties.segments[0].distance;
    time = feature.properties.segments[0].duration;
}

if (distance && time) {
    document.getElementById("stats").innerHTML =
        `Distance: ${(distance/1000).toFixed(2)} KM <br> Time: ${(time/60).toFixed(0)} min`;
} else {
    document.getElementById("stats").innerHTML =
        "Distance: -- <br> Time: --";
}
    }catch(err){
        console.log(err);
        alert("Route error. Check API key.");
    }
}

/* 🚨 WRONG ROUTE */
function checkRoute(lat, lon) {

    let offRoute = isOffRoute(lat, lon); // your logic

    if (offRoute && !warningGiven) {
        speak("You are going in wrong route");
        alert("⚠️ You are off route!");
        warningGiven = true;
    }

    if (!offRoute) {
        warningGiven = false;
    }
}

/* 🔁 REROUTE */
async function reroute(lat,lon){

    let end = document.getElementById("end").value;

    let geoEnd = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(end + ", India")}`);
    let edata = await geoEnd.json();

    let endCoord = edata.features[0].geometry.coordinates;

    let routeRes = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{
        method:"POST",
        headers:{
            "Authorization":API_KEY,
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            coordinates: [[lon,lat], endCoord]
        })
    });

    let routeData = await routeRes.json();

    routeCoords = routeData.features[0].geometry.coordinates;

    if (routeLine) {
    map.removeLayer(routeLine);
}

    routeLine = L.geoJSON(routeData,{
        style:{color:"red",weight:6}
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());
    navigationStarted = true;
    speak("Rerouting...");
    rerouting = false;
}

/* 💾 SAVE (NO BREAKING DB) */
function saveBehavior(lat,lon){

    fetch('/save_behavior',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
            deviations: Math.floor(Math.random()*2),
            stops: Math.floor(Math.random()*2),
            confusion: rerouting ? 1 : 0,
            lat: lat,
            lon: lon
        })
    });
}

/* 🔊 VOICE */
function speak(text){
    let msg = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(msg);
}

/* 🔧 KEEP */
function findPlace(type){
    alert("Showing nearby "+type);
}

</script>

</body>
</html>
