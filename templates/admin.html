<!DOCTYPE html>
<html lang="en">
<head>
  <title>DriveIQ – Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>
    :root {
      --bg: #050810;
      --surface: #0f1629;
      --surface2: #1a2235;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --green: #10b981;
      --orange: #f59e0b;
      --red: #ef4444;
      --text: #f1f5f9;
      --muted: #64748b;
      --border: rgba(255,255,255,0.08);
      --glass: rgba(15,22,41,0.92);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .admin-badge {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.3);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }

    .header-stats { display: flex; gap: 20px; margin-left: auto; }

    .hstat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      font-size: 12px;
    }

    .hstat-val {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
    }

    .hstat-label { color: var(--muted); font-size: 11px; margin-top: 2px; }

    .chip {
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      transition: 0.2s;
    }

    .chip:hover { border-color: var(--accent); color: var(--text); }

    /* LAYOUT */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* MAP */
    #map {
      flex: 1;
      height: 100%;
      filter: saturate(0.7) brightness(0.85);
    }

    /* RIGHT SIDEBAR */
    .sidebar {
      width: 300px;
      height: 100%;
      overflow-y: auto;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ANALYTICS */
    .analytics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .a-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .a-card-val {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
    }

    .a-card-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ALERTS */
    .alert-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }

    .alert-item {
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .alert-danger  { background: rgba(239,68,68,0.12);  border: 1px solid rgba(239,68,68,0.25); }
    .alert-warning { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.25); }
    .alert-safe    { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.25); }

    /* USER LIST */
    .user-list { display: flex; flex-direction: column; gap: 6px; }

    .user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.2s;
    }

    .user-item:hover { border-color: var(--accent); }

    .user-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .user-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* BLINK */
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .blink-marker { animation: blink 1s infinite; }

    .live-dot {
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1s infinite;
      margin-right: 6px;
    }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">⚡ DriveIQ</div>
  <div class="admin-badge">🔴 ADMIN</div>

  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val">{{ users|length }}</div>
      <div class="hstat-label">Users</div>
    </div>
    <div class="hstat">
      <div class="hstat-val">{{ total_trips }}</div>
      <div class="hstat-label">Total Trips</div>
    </div>
    <div class="hstat">
      <div class="hstat-val">{{ avg_score }}</div>
      <div class="hstat-label">Avg Score</div>
    </div>
  </div>

  <a href="/logout" class="chip">🚪 Logout</a>
</div>

<!-- Body -->
<div class="body">

  <!-- Map -->
  <div id="map"></div>

  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Live Analytics -->
    <div class="sidebar-section">
      <div class="section-title"><span class="live-dot"></span> Live Analytics</div>
      <div class="analytics-grid">
        <div class="a-card">
          <div class="a-card-val" id="liveCount" style="color: var(--accent2);">0</div>
          <div class="a-card-label">Active now</div>
        </div>
        <div class="a-card">
          <div class="a-card-val" id="avgLive" style="color: var(--green);">--</div>
          <div class="a-card-label">Avg Score</div>
        </div>
        <div class="a-card">
          <div class="a-card-val" id="safeCount" style="color: var(--green);">0</div>
          <div class="a-card-label">Safe</div>
        </div>
        <div class="a-card">
          <div class="a-card-val" id="dangerCount" style="color: var(--red);">0</div>
          <div class="a-card-label">At Risk</div>
        </div>
      </div>
    </div>

    <!-- Live Alerts -->
    <div class="sidebar-section">
      <div class="section-title">🚨 Live Alerts</div>
      <div class="alert-list" id="alertList">
        <div style="color: var(--muted); font-size: 13px;">Waiting for active drivers...</div>
      </div>
    </div>

    <!-- Registered Users -->
    <div class="sidebar-section" style="flex:1;">
      <div class="section-title">👤 All Users ({{ users|length }})</div>
      <div class="user-list" id="userList">
        {% for user in users %}
        <a href="/user/{{ user[1] }}" class="user-item">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="user-dot" id="dot-{{ user[1] }}"></div>
            <span>{{ user[1] }}</span>
          </div>
          <span style="color: var(--muted); font-size: 12px;">→</span>
        </a>
        {% endfor %}
      </div>
    </div>

  </div>
</div>

<script>
// ── MAP ──
const map = L.map('map').setView([17.3850, 78.4867], 11);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const markers = {};
const activeUsers = new Set();

// ── FETCH & REFRESH ──
async function loadLive() {
  try {
    const res = await fetch('/live_data');
    if (!res.ok) return;
    const users = await res.json();

    const alertList = document.getElementById('alertList');
    alertList.innerHTML = '';

    let safe = 0, atRisk = 0, total = 0, scoreSum = 0;
    const nowActive = new Set();

    users.forEach(user => {
      const { username, score, lat, lon, driver_type } = user;
      nowActive.add(username);
      total++;
      scoreSum += score;

      const color = score >= 70 ? '#10b981' : score >= 50 ? '#f59e0b' : '#ef4444';

      if (score >= 70) safe++;
      else atRisk++;

      // Map marker
      if (markers[username]) {
        markers[username].setLatLng([lat, lon]);
        markers[username].setStyle({ color, fillColor: color });
      } else {
        markers[username] = L.circleMarker([lat, lon], {
          radius: 10,
          color,
          fillColor: color,
          fillOpacity: 0.85,
          weight: 2
        }).addTo(map);
      }

      markers[username].bindPopup(`
        <div style="font-family:'DM Sans',sans-serif;">
          <b>${username}</b><br>
          Score: <b style="color:${color}">${score}</b><br>
          Type: ${driver_type || '—'}
        </div>
      `);

      // Blink if danger
      if (markers[username]._path) {
        markers[username]._path.style.animation = score < 50 ? 'blink 1s infinite' : '';
      }

      // Alert item
      const cls = score < 50 ? 'alert-danger' : score < 70 ? 'alert-warning' : 'alert-safe';
      const icon = score < 50 ? '🔴' : score < 70 ? '🟡' : '🟢';
      alertList.innerHTML += `
        <div class="alert-item ${cls}">
          <span>${icon}</span>
          <span><b>${username}</b> — ${score}</span>
        </div>`;

      // Online dot
      const dot = document.getElementById(`dot-${username}`);
      if (dot) dot.classList.add('online');
    });

    // Remove stale markers
    Object.keys(markers).forEach(u => {
      if (!nowActive.has(u)) {
        map.removeLayer(markers[u]);
        delete markers[u];
        const dot = document.getElementById(`dot-${u}`);
        if (dot) dot.classList.remove('online');
      }
    });

    // Update analytics
    document.getElementById('liveCount').textContent = total;
    document.getElementById('safeCount').textContent = safe;
    document.getElementById('dangerCount').textContent = atRisk;
    document.getElementById('avgLive').textContent = total ? Math.round(scoreSum / total) : '--';

    if (!total) {
      alertList.innerHTML = '<div style="color:var(--muted);font-size:13px;">No active drivers right now.</div>';
    }

  } catch (err) {
    console.error('Live data error:', err);
  }
}

// Refresh every 3 seconds
setInterval(loadLive, 3000);
loadLive();
</script>

</body>
</html>
